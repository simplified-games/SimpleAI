<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleAI</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">

  <!-- highlight.js — Atom One Dark theme, matches existing pre colours -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<!-- ══ LOGIN PAGE ══════════════════════════════════════════════════════════════ -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">SimpleAI</div>
    <p class="login-sub">Your intelligent assistant, powered by the world's best models.</p>
    <button id="google-login-btn" class="google-btn">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <p class="login-footer">By continuing, you agree to SimpleAI's Terms of Service.</p>
  </div>
</div>

<!-- ══ MAIN APP ════════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── SIDEBAR ──────────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">SimpleAI</span>
      <span class="admin-badge-placeholder"></span>
      <button class="sidebar-toggle sidebar-toggle-btn" title="Toggle sidebar">☰</button>
    </div>

    <button id="new-chat-btn" class="new-chat-btn">
      <span>✏️</span> New chat
    </button>

    <div class="sidebar-section-title">Recents</div>
    <div id="chat-list"></div>

    <div class="sidebar-footer">
      <div style="padding:6px 8px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;">
        <span id="token-badge" class="token-badge">Loading…</span>
        <span id="reset-timer" style="font-size:.72rem;color:var(--text-muted)"></span>
      </div>

      <div class="user-info">
        <div class="user-avatar">
          <img id="user-avatar-img" src="" alt="" style="display:none">
          <span id="user-avatar-letter">U</span>
        </div>
        <div class="user-meta">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-email" id="user-email"></div>
        </div>
        <button id="signout-btn" title="Sign out" style="color:var(--text-muted);font-size:.8rem;padding:4px 6px;border-radius:6px;">⏻</button>
      </div>

      <button id="admin-nav-btn" style="display:none;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:10px;font-size:.85rem;font-weight:600;color:#f59e0b;margin-top:6px;transition:background .12s;" onmouseover="this.style.background='#fef3c7'" onmouseout="this.style.background=''">
        ⚙️ Admin Panel
      </button>
    </div>
  </aside>

  <!-- ── MAIN ─────────────────────────────────────────────────────────────── -->
  <div id="main">

    <header id="header">
      <button class="header-toggle-btn sidebar-toggle-btn" title="Toggle sidebar">☰</button>
      <button id="model-selector-btn"><!-- filled by JS --></button>
      <div id="reasoning-row" style="display:none;align-items:center;gap:6px;margin-left:8px;">
        <label class="reasoning-toggle" id="reasoning-label">
          <input type="checkbox" id="reasoning-toggle"> 🧠 Reasoning
        </label>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="startNewChat()" title="New chat">✏️ New</button>
      </div>
    </header>

    <div id="chat-area"></div>

    <div id="input-area">
      <div class="input-wrapper">
        <div id="image-preview-container"></div>
        <div class="input-toolbar">
          <button class="input-tool-btn" id="image-upload-btn" title="Attach image">🖼 Image</button>
          <input type="file" id="image-input" accept="image/*" style="display:none">
          <button class="input-tool-btn" onclick="document.getElementById('image-input').click()" style="display:none">📎</button>
        </div>
        <div class="input-row">
          <textarea id="message-input" placeholder="Ask SimpleAI anything…" rows="1"></textarea>
          <button class="send-btn" id="send-btn">➤</button>
        </div>
        <div class="input-footer">
          <div class="token-reset-info">
            <span>⏱</span>
            <span id="footer-reset-timer" style="font-size:.72rem;color:var(--text-muted)"></span>
          </div>
          <span style="font-size:.72rem;color:var(--text-muted)">SimpleAI can make mistakes.</span>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<!-- ══ MODEL PICKER MODAL ══════════════════════════════════════════════════════ -->
<div id="model-modal" class="hidden">
  <div class="model-modal-inner">
    <div class="modal-header">
      <span style="font-size:1.3rem">🤖</span>
      <span class="modal-title">Choose a model</span>
      <button id="modal-close" class="modal-close">✕</button>
    </div>
    <div class="model-categories" id="model-categories">
      <button class="cat-btn active" data-cat="All">All</button>
      <button class="cat-btn" data-cat="Fast">⚡ Fast</button>
      <button class="cat-btn" data-cat="Balanced">⚖️ Balanced</button>
      <button class="cat-btn" data-cat="Powerful">💪 Powerful</button>
      <button class="cat-btn" data-cat="Most Powerful">🌟 Most Powerful</button>
      <button class="cat-btn" data-cat="Reasoning">🧠 Reasoning</button>
      <button class="cat-btn" data-cat="Code">💻 Code</button>
      <button class="cat-btn" data-cat="Image">🎨 Image</button>
    </div>
    <div class="model-grid" id="model-grid"></div>
  </div>
</div>

<!-- ══ ADMIN PANEL ═════════════════════════════════════════════════════════════ -->
<div id="admin-panel" class="hidden">
  <div class="admin-inner">
    <div class="modal-header">
      <span style="font-size:1.3rem">⚙️</span>
      <span class="modal-title">Admin Panel</span>
      <button id="admin-close" class="modal-close">✕</button>
    </div>
    <div class="admin-body">
      <div class="admin-section">
        <h3>Grant Tokens</h3>
        <div class="admin-grant-row">
          <input class="admin-input" id="admin-email-input" type="email" placeholder="user@example.com">
          <input class="admin-input" id="admin-amount-input" type="number" placeholder="Amount" style="max-width:120px" value="50000">
          <button class="admin-btn" id="admin-grant-btn">Grant</button>
        </div>
      </div>
      <div class="admin-section">
        <h3>All Users</h3>
        <table class="admin-users-table">
          <thead><tr><th>Email</th><th>Role</th><th>Token Balance</th><th>Total Used</th></tr></thead>
          <tbody id="admin-users-body">
            <tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- ══ FIREBASE + APP SCRIPTS ════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
